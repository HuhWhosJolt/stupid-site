<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="shortcuticon" href="#" type="image/x-icon">
  <title>Home - GoogleDrive</title>
  <link rel="stylesheet" href="indexcss.css">
</head>
<body>
  <div class="content-side">
    <h1 class="typewriter"><span id="cursor">Acheron</span></h1>
    <h2>AAA</h2>
  </div>
  <div class="buttons">
    <a href="#" class="main"><button class="btnMain">Games</button></a>
    <a href="#" class="main"><button class="btnMain">Extra</button></a>
    <a href="#" class="main"><button class="btnMain">Tools</button></a>
  </div>
  <script>
    function aboutBlank(event) {
      event.preventDefault();
      const destination=event.currentTarget.href;
      const win=window.open('about:blank','_blank')
      if (win) {
        const doc=win.document;
        const iframe=doc.createElement('iframe')
        iframe.style.width='100vw';
        iframe.style.height = '100vh';
        iframe.style.border = 'none';
        iframe.style.position = 'fixed';
        iframe.style.top = '0';
        iframe.style.left = '0';
        iframe.src = destination;
        doc.body.appendChild(iframe);
        doc.body.style.margin = '0';
      }
    }
    document.querySelectorAll('.main').forEach(element => {
      element.addEventListener('click', aboutBlank);
    });
  </script>
</body>
</html>
