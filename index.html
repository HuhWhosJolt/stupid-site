<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="shortcuticon" href="#" type="image/x-icon">
  <title>Home - GoogleDrive</title>
  <style>
    @font-face{
      font-family:'Ubuntu';
      src:url('/storage/fonts/ubuntu/Ubuntu.woff2')format('woff2'),
    }
    body{
      margin:0;
      padding:0;
      font-family:'Ubuntu',sans-serif;
      display:flex;
      background-color:black;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      animation:mainHeaderAnimation2sforwards;
      background-image:url('/images/backgrounds/seraph/offlinebg.jpg');
      background-position:center;
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }

    .content-side{
      width:100%;
      color:white;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      animation:mainHeaderAnimation1sease-in-outforwards;
    }

    h1{
      font-size:96px;
      font-weight:500;
      font-family:'Ubuntu',sans-serif;
      text-shadow:0010pxwhite,
      0010pxblack,
      0030pxwhite,
      0040pxblack,
      0050pxwhite,
      0060pxblack,
      0070pxwhite,
      0080px#000000;
      margin-bottom:0px;
      font-weight:bold;
    }

    h2{
      font-size:20px;
      font-weight:500;
    }

    p{
      font-size:18px;
      margin-bottom:2px;
      padding-left:10%;
      padding-right:10%;
      text-align:center;
      text-shadow:5px5px5pxvar(--text-glow);
    }

    .main{
      font-size:20px;
      text-align:center;
      border:3pxsolidtransparent;
      transition:0.15sease-in-out;
      text-shadow:5px5px5pxvar(--text-glow);
    }

    .main:hover{
      color:rgb(199,192,192);
    }


    .buttons{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btnMain{
      background-color:black;
      border:3pxsolidwhite;
      text-align:center;
      text-decoration:none;
      display:inline-block;
      font-size:16px;
      margin:8px;
      width:calc(50%-10px);
      max-width:480px;
      width:400px;
      max-height:100px;
      box-sizing:border-box;
      padding-left:10px;
      padding-right:10px;
      background-repeat:no-repeat;
      background-size:cover;
      border:3.2pxsolidwhite;
      border-radius:16px;
      transition:border0.1sease-in-out;
      position:relative;
    }

    .btnMain:hover{
      background-color:black;
      border:3.2pxsolidrgb(200,189,189);
    }
  </style>
</head>
<body>
  <div class="content-side">
    <h1 class="typewriter"><span id="cursor">Acheron</span></h1>
    <h2>AAA</h2>
  </div>
  <div class="buttons">
    <a href="#" class="main"><button class="btnMain">Games</button></a>
    <a href="#" class="main"><button class="btnMain">Extra</button></a>
    <a href="#" class="main"><button class="btnMain">Tools</button></a>
  </div>
  <script>
    function aboutBlank(event) {
      event.preventDefault();
      const destination=event.currentTarget.href;
      const win=window.open('about:blank','_blank')
      if (win) {
        const doc=win.document;
        const iframe=doc.createElement('iframe')
        iframe.style.width='100vw';
        iframe.style.height = '100vh';
        iframe.style.border = 'none';
        iframe.style.position = 'fixed';
        iframe.style.top = '0';
        iframe.style.left = '0';
        iframe.src = destination;
        doc.body.appendChild(iframe);
        doc.body.style.margin = '0';
      }
    }
    document.querySelectorAll('.main').forEach(element => {
      element.addEventListener('click', aboutBlank);
    });
  </script>
</body>
</html>
