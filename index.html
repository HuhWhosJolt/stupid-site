<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="shortcuticon" href="#" type="image/x-icon">
  <title>Home-GoogleDrive</title>
  <style>
    @font-face{
      font-family:'Ubuntu';
      src:url('/storage/fonts/ubuntu/Ubuntu.woff2')format('woff2'),
    }
    body{
      margin:0;
      padding:0;
      font-family:'Ubuntu',sans-serif;
      display:flex;
      background-color:black;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      animation:mainHeaderAnimation2sforwards;
      background-image:url('/images/backgrounds/seraph/offlinebg.jpg');
      background-position:center;
      background-repeat:no-repeat;
      background-size:cover;
      background-attachment:fixed;
    }

    .content-side{
      width:100%;
      color:white;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      animation:mainHeaderAnimation1sease-in-outforwards;
    }

    h1{
      font-size:96px;
      font-weight:500;
      font-family:'Ubuntu',sans-serif;
      text-shadow:0010pxwhite,
      0010pxblack,
      0030pxwhite,
      0040pxblack,
      0050pxwhite,
      0060pxblack,
      0070pxwhite,
      0080px#000000;
      margin-bottom:0px;
      font-weight:bold;
    }

    h2{
      font-size:20px;
      font-weight:500;
    }

    p{
      font-size:18px;
      margin-bottom:2px;
      padding-left:10%;
      padding-right:10%;
      text-align:center;
      text-shadow:5px5px5pxvar(--text-glow);
    }

    .linkpa{
      font-size:20px;
      text-align:center;
      border:3pxsolidtransparent;
      transition:0.15sease-in-out;
      text-shadow:5px5px5pxvar(--text-glow);
    }

    .linkpa:hover{
      color:rgb(199,192,192);
    }

    a{
      font-size:18px;
      text-decoration:underline;
      color:var(--text-color);
      text-shadow:5px5px5pxvar(--text-glow);
    }

    .button-container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }

    .button{
      background-color:black;
      border:3pxsolidwhite;
      text-align:center;
      text-decoration:none;
      display:inline-block;
      font-size:16px;
      margin:8px;
      width:calc(50%-10px);
      max-width:480px;
      width:400px;
      max-height:100px;
      box-sizing:border-box;
      padding-left:10px;
      padding-right:10px;
      background-repeat:no-repeat;
      background-size:cover;
      border:3.2pxsolidwhite;
      border-radius:16px;
      transition:border0.1sease-in-out;
      position:relative;
    }

    .button:hover{
      background-color:black;
      border:3.2pxsolidrgb(200,189,189);
    }

    .buttonh2{
      font-size:30px;
      text-align:center;
    }

    .delete-button{
      position:absolute;
      top:5px;
      right:5px;
      z-index:2;
    }

    #online-notice{
      display:none;
      background-color:#050505;
      border:3pxsolidwhite;
      border-radius:16px;
      color:white;
      text-align:center;
      padding:15px;
      font-family:'Ubuntu',sans-serif;
      z-index:1000;
      font-size:16px;
      width:100%;
      max-width:500px;
    }

    @keyframes mainHeaderAnimation{
      0%{
        opacity:0;
        transform:translateY(-5%);
      }
      100%{
        opacity:1;
        transform:translateY(0%);
      }
    }
  </style>
</head>
<body>
  <div class="content-side">
    <h1 class="typewriter"><span id="cursor">Acheron</span></h1>
    <h2>RemasterofSeraph,GN-Math,andafewothergamesites.</h2>
  </div>
  <div>
  </div>
</body>
</html>
